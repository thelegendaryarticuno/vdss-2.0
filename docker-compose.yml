version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vdss-postgres
    environment:
      POSTGRES_DB: vdss
      POSTGRES_USER: vdss_user
      POSTGRES_PASSWORD: vdss_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vdss_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
